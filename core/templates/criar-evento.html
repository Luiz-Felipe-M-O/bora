{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#C6B8BB">
    <meta name="format-detection" content="telephone=no">
    <title>Criar Evento - BORA!</title>
    <meta name="description" content="Crie um novo evento e reuna sua turma">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}">
</head>

<body>
    <div class="app-shell">
        <!-- Status Bar Spacer -->
        <div class="status-bar"></div>

        <!-- Top Header -->
        <header class="top-header">
            <a href="/evento" class="back-btn" aria-label="Voltar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </a>
            <h1 class="header-title">Criar Evento</h1>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <form id="criar-form" method="POST" class="form-container">
                {% csrf_token %}

                <!-- Titulo -->
                <div class="form-group">
                    <label for="titulo" class="form-label">
                        Titulo do evento <span class="required">*</span>
                    </label>
                    <input type="text" id="titulo" name="titulo" class="form-input" placeholder="Ex: Pelada de futebol"
                        maxlength="100" required>
                </div>

                <!-- Descricao -->
                <div class="form-group">
                    <label for="descricao" class="form-label">Descricao</label>
                    <textarea id="descricao" name="descricao" class="form-input"
                        placeholder="Conte mais sobre o evento..."></textarea>
                    <p class="form-hint">Adicione detalhes como regras, o que levar, nivel de experiencia, etc.</p>
                </div>

                <!-- Emoji -->
                <div class="form-group">
                    <label class="form-label">Icone do evento</label>
                    <div class="emoji-selector">
                        <label class="emoji-option selected">
                            <input type="radio" name="emoji" value="🃏" checked>
                            🃏
                        </label>
                        <label class="emoji-option">
                            <input type="radio" name="emoji" value="♟️">
                            ♟️
                        </label>
                        <label class="emoji-option">
                            <input type="radio" name="emoji" value="🐉">
                            🐉
                        </label>
                        <label class="emoji-option">
                            <input type="radio" name="emoji" value="🏸">
                            🏸
                        </label>
                        <label class="emoji-option">
                            <input type="radio" name="emoji" value="🎸">
                            🎸
                        </label>
                    </div>
                </div>

                <div class="section-divider">
                    <div class="section-divider-line"></div>
                    <span class="section-divider-text">Quando e onde</span>
                    <div class="section-divider-line"></div>
                </div>

                <!-- Data e Hora -->
                <div class="datetime-row">
                    <div class="form-group">
                        <label for="data" class="form-label">Data</label>
                        <input type="date" id="data" name="data" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="hora" class="form-label">Hora</label>
                        <input type="time" id="hora" name="hora" class="form-input">
                    </div>
                </div>

                <!-- Local -->
                <div class="form-group">
                    <label for="local" class="form-label">Local</label>
                    <input type="text" id="local" name="local" class="form-input" placeholder="Ex: Quadra do Campus JK"
                        maxlength="200">
                </div>

                <!-- Preview -->
                <div class="preview-section">
                    <p class="preview-label">Pre-visualizacao</p>
                    <div class="preview-card">
                        <div class="preview-emoji">🃏</div>
                        <div class="preview-content">
                            <h3 class="preview-title placeholder">Titulo do evento</h3>
                            <div class="preview-meta">
                                <span class="preview-meta-item">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                                        <line x1="16" x2="16" y1="2" y2="6" />
                                        <line x1="8" x2="8" y1="2" y2="6" />
                                        <line x1="3" x2="21" y1="10" y2="10" />
                                    </svg>
                                    Data e hora
                                </span>
                                <span class="preview-meta-item">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                                        <circle cx="12" cy="10" r="3" />
                                    </svg>
                                    Local
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="height: 24px;"></div>
            </form>
        </main>

        <!-- Submit Section -->
        <div class="submit-section">
            <button type="submit" form="criar-form" class="submit-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14" />
                    <path d="m19 12-7 7-7-7" />
                </svg>
                Criar evento
            </button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const emojiRadios = document.querySelectorAll('.emoji-option input[type="radio"]');
            
            emojiRadios.forEach(radio => {
                radio.addEventListener('change', function() {
                    // Remove a classe 'selected' de todos os ícones
                    document.querySelectorAll('.emoji-option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    
                    // Adiciona a classe 'selected' apenas no ícone clicado
                    if (this.checked) {
                        this.parentElement.classList.add('selected');
                    }
                });
            });
        });
    </script>
</body>
</html>
