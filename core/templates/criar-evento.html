<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f97316">
  <meta name="format-detection" content="telephone=no">
  <title>Criar Evento - BORA!</title>
  <meta name="description" content="Crie um novo evento e reuna sua turma">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    :root {
      --primary: #f97316;
      --primary-light: #fed7aa;
      --primary-dark: #ea580c;
      --secondary: #14b8a6;
      --accent: #a78bfa;
      --background: #fafafa;
      --foreground: #171717;
      --muted: #f5f5f5;
      --muted-foreground: #737373;
      --card: #ffffff;
      --border: #e5e5e5;
      --radius: 16px;
      --danger: #ef4444;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      line-height: 1.5;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none;
    }

    /* App Shell */
    .app-shell {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      background: var(--background);
    }

    /* Status Bar Spacer */
    .status-bar {
      height: var(--safe-top);
      background: var(--card);
      flex-shrink: 0;
    }

    /* Top Header */
    .top-header {
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--muted);
      color: var(--foreground);
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .back-btn:active {
      background: var(--border);
      transform: scale(0.95);
    }

    .header-title {
      font-size: 1.125rem;
      font-weight: 700;
      flex: 1;
    }

    /* Main Content - Scrollable */
    .main-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    /* Form */
    .form-container {
      padding: 20px 16px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--foreground);
    }

    .form-label .required {
      color: var(--danger);
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--foreground);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
    }

    .form-input::placeholder {
      color: var(--muted-foreground);
    }

    textarea.form-input {
      min-height: 120px;
      resize: vertical;
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      margin-top: 6px;
    }

    /* Emoji Selector */
    .emoji-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .emoji-option {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .emoji-option:active {
      transform: scale(0.95);
    }

    .emoji-option.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .emoji-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    /* Date/Time Input */
    .datetime-row {
      display: flex;
      gap: 12px;
    }

    .datetime-row .form-group {
      flex: 1;
    }

    /* Submit Section */
    .submit-section {
      padding: 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding-bottom: calc(16px + var(--safe-bottom));
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 16px 24px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s ease, background 0.15s ease;
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.3);
    }

    .submit-btn:active {
      transform: scale(0.98);
      background: var(--primary-dark);
    }

    .submit-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Section Divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .section-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-divider-text {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Preview Card */
    .preview-section {
      margin-top: 8px;
      padding: 16px;
      background: var(--muted);
      border-radius: var(--radius);
    }

    .preview-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .preview-card {
      display: flex;
      gap: 14px;
      padding: 14px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .preview-emoji {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.75rem;
      background: var(--primary-light);
    }

    .preview-content {
      flex: 1;
      min-width: 0;
    }

    .preview-title {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--foreground);
    }

    .preview-title.placeholder {
      color: var(--muted-foreground);
    }

    .preview-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    .preview-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .preview-meta-item svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* Utility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- Status Bar Spacer -->
    <div class="status-bar"></div>

    <!-- Top Header -->
    <header class="top-header">
      <a href="/evento" class="back-btn" aria-label="Voltar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </a>
      <h1 class="header-title">Criar Evento</h1>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <form action="" method="POST" class="form-container">
        {% csrf_token %}

        <!-- Titulo -->
        <div class="form-group">
          <label for="titulo" class="form-label">
            Titulo do evento <span class="required">*</span>
          </label>
          <input
            type="text"
            id="titulo"
            name="titulo"
            class="form-input"
            placeholder="Ex: Pelada de futebol"
            maxlength="100"
            required
          >
        </div>

        <!-- Descricao -->
        <div class="form-group">
          <label for="descricao" class="form-label">Descricao</label>
          <textarea
            id="descricao"
            name="descricao"
            class="form-input"
            placeholder="Conte mais sobre o evento..."
          ></textarea>
          <p class="form-hint">Adicione detalhes como regras, o que levar, nivel de experiencia, etc.</p>
        </div>

        <!-- Emoji -->
        <div class="form-group">
          <label class="form-label">Icone do evento</label>
          <div class="emoji-selector">
            <label class="emoji-option selected">
              <input type="radio" name="emoji" value="🎈" checked>
              🎈
            </label>
            <label class="emoji-option">
              <input type="radio" name="emoji" value="⚽">
              ⚽
            </label>
            <label class="emoji-option">
              <input type="radio" name="emoji" value="🃏">
              🃏
            </label>
            <label class="emoji-option">
              <input type="radio" name="emoji" value="♟️">
              ♟️
            </label>
            <label class="emoji-option">
              <input type="radio" name="emoji" value="🎲">
              🎲
            </label>
            <label class="emoji-option">
              <input type="radio" name="emoji" value="🏀">
              🏀
            </label>
          </div>
        </div>

        <div class="section-divider">
          <div class="section-divider-line"></div>
          <span class="section-divider-text">Quando e onde</span>
          <div class="section-divider-line"></div>
        </div>

        <!-- Data e Hora -->
        <div class="datetime-row">
          <div class="form-group">
            <label for="data" class="form-label">Data</label>
            <input
              type="date"
              id="data"
              name="data"
              class="form-input"
            >
          </div>
          <div class="form-group">
            <label for="hora" class="form-label">Hora</label>
            <input
              type="time"
              id="hora"
              name="hora"
              class="form-input"
            >
          </div>
        </div>

        <!-- Local -->
        <div class="form-group">
          <label for="local" class="form-label">Local</label>
          <input
            type="text"
            id="local"
            name="local"
            class="form-input"
            placeholder="Ex: Quadra do Campus JK"
            maxlength="200"
          >
        </div>

        <!-- Preview -->
        <div class="preview-section">
          <p class="preview-label">Pre-visualizacao</p>
          <div class="preview-card">
            <div class="preview-emoji">🎈</div>
            <div class="preview-content">
              <h3 class="preview-title placeholder">Titulo do evento</h3>
              <div class="preview-meta">
                <span class="preview-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
                    <line x1="16" x2="16" y1="2" y2="6"/>
                    <line x1="8" x2="8" y1="2" y2="6"/>
                    <line x1="3" x2="21" y1="10" y2="10"/>
                  </svg>
                  Data e hora
                </span>
                <span class="preview-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                    <circle cx="12" cy="10" r="3"/>
                  </svg>
                  Local
                </span>
              </div>
            </div>
          </div>
        </div>

        <div style="height: 24px;"></div>
      </form>
    </main>

    <!-- Submit Section -->
    <div class="submit-section">
      <button type="submit" form="" class="submit-btn" onclick="document.querySelector('form').submit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14"/>
          <path d="m19 12-7 7-7-7"/>
        </svg>
        Criar evento
      </button>
    </div>
  </div>
</body>
</html>
